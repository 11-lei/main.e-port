<!DOCTYPE html>
<html>
<head>
    <title>User Input Prompt</title>
</head>

<body>

<h2>User Input Example</h2>

<button onclick="askName()">Click Me</button>

<script>
function askName() {var name = prompt("Enter your name:");
if (name != null) {document.write("Hello, " + name + "! Welcome.");}}
</script>

</body>
</html>
