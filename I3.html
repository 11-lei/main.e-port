<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Variable Declaration</title>
    <script>
        var name = "Hannah";
        var age = 16;
        var city = "Quezon City";
        var grade = 11;
    </script>
</head>

<body>
    <h2>Declaring Variables in JavaScript</h2>

    <p id="demo"></p>

    <script>
        document.getElementById("demo").innerHTML =
        "Name: " + name + "<br>" +
        "Age: " + age + "<br>" +
        "City: " + city + "<br>" +
        "Grade: " + grade;
    </script>
</body>
</html>
